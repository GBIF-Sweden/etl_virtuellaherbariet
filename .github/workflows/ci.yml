name: CI Checks

on:
  workflow_call:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      PIP_ROOT_USER_ACTION: ignore

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Compile check
        run: python -m compileall main.py extraction transformation loading config
      - name: Test
        run: pytest -q
      - name: Security audit (pip-audit)
        run: pip-audit -r requirements.txt -r requirements-dev.txt
      - name: Security scan (Trivy filesystem)
        if: ${{ !env.ACT }}
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            aquasec/trivy:0.56.1 fs \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            /workspace
