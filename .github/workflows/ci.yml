name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Verify pinned dependencies
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          bad = []
          for fn in ["requirements.txt", "requirements-dev.txt"]:
              for i, line in enumerate(Path(fn).read_text(encoding="utf-8").splitlines(), start=1):
                  s = line.strip()
                  if not s or s.startswith("#"):
                      continue
                  if not re.search(r"==", s):
                      bad.append(f"{fn}:{i}:{s}")
          if bad:
              raise SystemExit("Unpinned dependencies found:\n" + "\n".join(bad))
          print("All dependencies are pinned with ==.")
          PY

      - name: Lint (ruff)
        run: ruff check . --select F,E9

      - name: Type check (mypy)
        run: mypy main.py pipeline.py config extraction loading transformation utils

      - name: Compile check
        run: python -m compileall main.py pipeline.py config extraction loading transformation utils tests

      - name: Run tests
        run: pytest -q tests

      - name: Security audit (pip-audit)
        run: pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Security scan (Trivy filesystem)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Ensure no tracked bytecode artifacts
        run: |
          if git ls-files | grep -E '(__pycache__/|\.pyc$)'; then
            echo "Tracked bytecode artifacts found. Remove __pycache__/ and *.pyc from git."
            exit 1
          fi

  publish-image:
    name: Build and Publish Docker Image
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Security scan (Trivy image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.ref_name }}
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
